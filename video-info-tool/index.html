<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Info Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px; margin: 0 auto; padding: 20px;
            line-height: 1.6; background: #1a1a2e; color: #eee;
        }
        h1 { text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 25px; font-size: 14px; }
        .subtitle a { color: #6c9fff; text-decoration: none; }
        .drop-zone {
            border: 2px dashed #444; border-radius: 12px; padding: 50px 30px;
            text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 25px;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #6c9fff; background: rgba(108,159,255,0.05); }
        .drop-zone .icon { font-size: 40px; margin-bottom: 10px; }
        .drop-zone .text { color: #888; font-size: 16px; }
        .drop-zone .text strong { color: #6c9fff; }
        .section { background: #252540; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .section h2 {
            font-size: 13px; text-transform: uppercase; color: #888;
            letter-spacing: 0.5px; margin: 0 0 15px;
        }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
        }
        .grid .item label {
            display: block; font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 2px;
        }
        .grid .item .val { font-size: 16px; font-weight: 600; color: #6c9fff; word-break: break-all; }
        .grid .item .val.sm { font-size: 13px; font-family: 'Monaco','Consolas',monospace; font-weight: 400; }
        .efficiency {
            font-size: 12px; color: #4ade80; font-family: 'Monaco','Consolas',monospace; margin-top: 10px;
        }
        .track { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .track:first-child { margin-top: 0; padding-top: 0; border-top: none; }
        .track h3 { font-size: 13px; color: #ccc; margin: 0 0 10px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 13px; background: #1a1a2e; padding: 4px 10px; border-radius: 4px; }
        .tag .name { color: #888; }
        .btn {
            background: #6c9fff; color: #fff; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn:hover { background: #5a8ae6; }
        .btn.sec { background: #444; }
        .btn.sec:hover { background: #555; }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab {
            background: #1a1a2e; border: 1px solid #444; color: #888;
            padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .tab:hover { border-color: #6c9fff; color: #fff; }
        .tab.on { background: #6c9fff; border-color: #6c9fff; color: #fff; }
        pre.code {
            background: #1a1a2e; padding: 12px; border-radius: 4px; font-size: 12px;
            overflow: auto; margin: 0 0 12px; max-height: 300px; white-space: pre-wrap;
        }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .feedback { color: #4ade80; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
        .feedback.show { opacity: 1; }
        .error {
            background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444;
            padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none;
        }
        .loading { text-align: center; padding: 40px; color: #888; }
        footer { text-align: center; margin-top: 30px; color: #666; font-size: 13px; }
        footer a { color: #6c9fff; text-decoration: none; }
        @media (max-width: 600px) {
            body { padding: 15px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .drop-zone { padding: 30px 15px; }
        }
    </style>
</head>
<body>
    <h1>Video Info Tool</h1>
    <p class="subtitle">
        Media metadata via <a href="https://mediabunny.dev">mediabunny</a> ·
        <a href="https://github.com/talmolab/vibes">vibes</a>
    </p>

    <div class="drop-zone" id="drop">
        <div class="icon">🎬</div>
        <div class="text"><strong>Drop media file here</strong> or click to browse</div>
    </div>
    <div class="error" id="err"></div>
    <div id="out"></div>

    <footer>Part of <a href="https://github.com/talmolab/vibes">vibes</a></footer>

    <script type="module">
    const CDN = 'https://cdn.jsdelivr.net/npm/mediabunny/+esm';
    let mb;
    try {
        mb = await import(CDN);
    } catch {
        document.getElementById('err').textContent = 'Failed to load mediabunny library.';
        document.getElementById('err').style.display = 'block';
        throw new Error('mediabunny import failed');
    }
    const { Input, ALL_FORMATS, BlobSource } = mb;

    const drop = document.getElementById('drop');
    const errEl = document.getElementById('err');
    const out = document.getElementById('out');
    let info = null, fmt = 'json', codeEl = null;

    // File picking: prefer File System Access API, fall back to <input>
    async function pickFile() {
        if ('showOpenFilePicker' in window) {
            try {
                const [handle] = await window.showOpenFilePicker({
                    types: [{ description: 'Media files', accept: { 'video/*': [], 'audio/*': [] } }]
                });
                return await handle.getFile();
            } catch (e) {
                if (e.name === 'AbortError') return null;
            }
        }
        return new Promise(resolve => {
            const inp = Object.assign(document.createElement('input'), { type: 'file', accept: 'video/*,audio/*' });
            inp.onchange = () => resolve(inp.files[0]);
            inp.click();
        });
    }

    drop.onclick = async () => { const f = await pickFile(); if (f) analyze(f); };
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => {
        e.preventDefault(); drop.classList.remove('dragover');
        const f = e.dataTransfer.files[0]; if (f) analyze(f);
    };

    // DOM helpers
    const h = (tag, cls, text) => {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text != null) e.textContent = text;
        return e;
    };
    const gridItem = (label, value, small) => {
        const d = h('div', 'item');
        d.append(h('label', null, label), h('div', small ? 'val sm' : 'val', String(value)));
        return d;
    };
    const fmtBytes = b => {
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
        return (b / 1073741824).toFixed(2) + ' GB';
    };
    const fmtDur = s => {
        if (s < 60) return s.toFixed(3) + ' s';
        if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60).toFixed(1) + 's';
        return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm ' + Math.round(s % 60) + 's';
    };
    const fmtBits = bps => {
        if (bps < 1e3) return Math.round(bps) + ' bps';
        if (bps < 1e6) return (bps / 1e3).toFixed(0) + ' kbps';
        return (bps / 1e6).toFixed(1) + ' Mbps';
    };
    const fmtRate = hz => (hz % 1 < 0.005 ? Math.round(hz).toString() : hz.toFixed(3));

    async function analyze(file) {
        errEl.style.display = 'none';
        out.innerHTML = '';
        out.append(h('div', 'loading', 'Analyzing...'));

        try {
            const source = new BlobSource(file);
            const input = new Input({ source, formats: ALL_FORMATS });
            let bytesRead = 0;
            source.onread = (s, e) => { bytesRead += e - s; };

            const [format, mimeType, duration, tracks, tags] = await Promise.all([
                input.getFormat(),
                input.getMimeType(),
                input.computeDuration(),
                input.getTracks(),
                input.getMetadataTags(),
            ]);

            const trackDetails = await Promise.all(tracks.map(async t => {
                const [cs, stats, dur] = await Promise.all([
                    t.getCodecParameterString().catch(() => null),
                    t.computePacketStats().catch(() => null),
                    t.computeDuration().catch(() => null),
                ]);
                const d = {
                    type: t.type, number: t.number,
                    codec: String(t.codec ?? t.internalCodecId ?? 'unknown'),
                    codecString: cs, duration: dur, language: t.languageCode,
                };
                if (stats) {
                    d.packetCount = stats.packetCount;
                    d.packetRate = stats.averagePacketRate;
                    d.bitrate = stats.averageBitrate;
                }
                if (t.isVideoTrack()) {
                    const [color, hdr] = await Promise.all([
                        t.getColorSpace().catch(() => null),
                        t.hasHighDynamicRange().catch(() => false),
                    ]);
                    Object.assign(d, {
                        codedWidth: t.codedWidth, codedHeight: t.codedHeight,
                        displayWidth: t.displayWidth, displayHeight: t.displayHeight,
                        rotation: t.rotation, par: t.pixelAspectRatio,
                        colorSpace: color, hdr,
                    });
                }
                if (t.isAudioTrack()) {
                    Object.assign(d, { sampleRate: t.sampleRate, channels: t.numberOfChannels });
                }
                return d;
            }));

            const tagObj = {};
            if (tags) {
                for (const k of ['title','artist','album','albumArtist','genre','date',
                    'description','comment','trackNumber','tracksTotal','discNumber',
                    'discsTotal','lyrics']) {
                    if (tags[k] != null) {
                        tagObj[k] = tags[k] instanceof Date ? tags[k].toISOString().slice(0, 10) : String(tags[k]);
                    }
                }
            }

            info = {
                filename: file.name, fileSize: file.size,
                format: format.name, mimeType, duration,
                tracks: trackDetails,
                tags: Object.keys(tagObj).length ? tagObj : null,
                bytesRead,
            };

            input.dispose();
            render(info);
        } catch (e) {
            out.innerHTML = '';
            errEl.textContent = 'Error: ' + e.message;
            errEl.style.display = 'block';
        }
    }

    function render(info) {
        out.innerHTML = '';

        // Overview
        const ov = h('div', 'section');
        ov.append(h('h2', null, 'Overview'));
        const g = h('div', 'grid');
        g.append(
            gridItem('File', info.filename),
            gridItem('Format', info.format),
            gridItem('Duration', fmtDur(info.duration)),
            gridItem('File Size', fmtBytes(info.fileSize)),
            gridItem('Overall Bitrate', fmtBits(info.fileSize * 8 / info.duration)),
        );
        ov.append(g);
        const mg = h('div', 'grid'); mg.style.marginTop = '12px';
        mg.append(gridItem('MIME Type', info.mimeType, true));
        ov.append(mg);
        ov.append(h('div', 'efficiency',
            `Bytes read: ${fmtBytes(info.bytesRead)} / ${fmtBytes(info.fileSize)} (${(100 * info.bytesRead / info.fileSize).toFixed(1)}%)`));
        out.append(ov);

        // Video tracks
        const vTracks = info.tracks.filter(t => t.type === 'video');
        if (vTracks.length) {
            const sec = h('div', 'section');
            sec.append(h('h2', null, `Video Track${vTracks.length > 1 ? 's' : ''}`));
            vTracks.forEach((t, i) => {
                const tr = h('div', 'track');
                if (vTracks.length > 1) tr.append(h('h3', null, `Track ${i + 1}`));
                const g = h('div', 'grid');
                g.append(gridItem('Codec', t.codecString || t.codec, true));
                g.append(gridItem('Resolution', `${t.codedWidth}\u00d7${t.codedHeight}`));
                if (t.displayWidth !== t.codedWidth || t.displayHeight !== t.codedHeight)
                    g.append(gridItem('Display Size', `${t.displayWidth}\u00d7${t.displayHeight}`));
                if (t.packetRate != null) g.append(gridItem('Frame Rate', fmtRate(t.packetRate) + ' fps'));
                if (t.packetCount != null) g.append(gridItem('Frames', t.packetCount.toLocaleString()));
                if (t.bitrate != null) g.append(gridItem('Bitrate', fmtBits(t.bitrate)));
                if (t.duration != null) g.append(gridItem('Duration', fmtDur(t.duration)));
                if (t.rotation) g.append(gridItem('Rotation', t.rotation + '\u00b0'));
                if (t.par && (t.par.num !== 1 || t.par.den !== 1))
                    g.append(gridItem('Pixel Aspect Ratio', `${t.par.num}:${t.par.den}`));
                if (t.hdr) g.append(gridItem('HDR', 'Yes'));
                if (t.colorSpace) {
                    if (t.colorSpace.primaries) g.append(gridItem('Color Primaries', t.colorSpace.primaries, true));
                    if (t.colorSpace.transfer) g.append(gridItem('Transfer', t.colorSpace.transfer, true));
                    if (t.colorSpace.matrix) g.append(gridItem('Matrix', t.colorSpace.matrix, true));
                }
                if (t.language && t.language !== 'und') g.append(gridItem('Language', t.language));
                tr.append(g); sec.append(tr);
            });
            out.append(sec);
        }

        // Audio tracks
        const aTracks = info.tracks.filter(t => t.type === 'audio');
        if (aTracks.length) {
            const sec = h('div', 'section');
            sec.append(h('h2', null, `Audio Track${aTracks.length > 1 ? 's' : ''}`));
            aTracks.forEach((t, i) => {
                const tr = h('div', 'track');
                if (aTracks.length > 1) tr.append(h('h3', null, `Track ${i + 1}`));
                const g = h('div', 'grid');
                g.append(gridItem('Codec', t.codecString || t.codec, true));
                g.append(gridItem('Sample Rate', (t.sampleRate / 1000).toFixed(1) + ' kHz'));
                g.append(gridItem('Channels', String(t.channels)));
                if (t.bitrate != null) g.append(gridItem('Bitrate', fmtBits(t.bitrate)));
                if (t.duration != null) g.append(gridItem('Duration', fmtDur(t.duration)));
                if (t.language && t.language !== 'und') g.append(gridItem('Language', t.language));
                tr.append(g); sec.append(tr);
            });
            out.append(sec);
        }

        // Subtitle tracks
        const sTracks = info.tracks.filter(t => t.type === 'subtitle');
        if (sTracks.length) {
            const sec = h('div', 'section');
            sec.append(h('h2', null, `Subtitle Track${sTracks.length > 1 ? 's' : ''}`));
            sTracks.forEach((t, i) => {
                const tr = h('div', 'track');
                if (sTracks.length > 1) tr.append(h('h3', null, `Track ${i + 1}`));
                const g = h('div', 'grid');
                g.append(gridItem('Codec', t.codecString || t.codec, true));
                if (t.language && t.language !== 'und') g.append(gridItem('Language', t.language));
                tr.append(g); sec.append(tr);
            });
            out.append(sec);
        }

        // Metadata tags
        if (info.tags) {
            const sec = h('div', 'section');
            sec.append(h('h2', null, 'Metadata Tags'));
            const tg = h('div', 'tags');
            for (const [k, v] of Object.entries(info.tags)) {
                const t = h('span', 'tag');
                t.append(h('span', 'name', k + ': '));
                t.append(document.createTextNode(v));
                tg.append(t);
            }
            sec.append(tg); out.append(sec);
        }

        // Export
        const exp = h('div', 'section');
        exp.append(h('h2', null, 'Export'));
        const tabs = h('div', 'tabs');
        for (const f of ['json', 'python', 'csv']) {
            const b = h('button', 'tab' + (f === fmt ? ' on' : ''), f.toUpperCase());
            b.onclick = () => {
                fmt = f;
                tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t === b));
                codeEl.textContent = getExport();
            };
            tabs.append(b);
        }
        exp.append(tabs);
        codeEl = h('pre', 'code');
        codeEl.textContent = getExport();
        exp.append(codeEl);

        const row = h('div', 'row');
        const copyBtn = h('button', 'btn', 'Copy');
        const dlBtn = h('button', 'btn sec', 'Download');
        const fb = h('span', 'feedback', 'Copied!');
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(getExport()).then(() => {
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = getExport();
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 2000);
            });
        };
        dlBtn.onclick = () => {
            const ext = { json: 'json', python: 'py', csv: 'csv' }[fmt];
            const a = h('a');
            a.href = URL.createObjectURL(new Blob([getExport()], { type: 'text/plain' }));
            a.download = `media_info.${ext}`;
            a.click(); URL.revokeObjectURL(a.href);
        };
        row.append(copyBtn, dlBtn, fb);
        exp.append(row); out.append(exp);
    }

    function getExport() {
        if (!info) return '';
        const obj = {
            filename: info.filename, format: info.format, mime_type: info.mimeType,
            duration_seconds: +info.duration.toFixed(3), file_size_bytes: info.fileSize,
        };
        const vt = info.tracks.filter(t => t.type === 'video');
        if (vt.length) {
            obj.video_tracks = vt.map(t => {
                const o = { codec: t.codecString || t.codec, width: t.codedWidth, height: t.codedHeight };
                if (t.displayWidth !== t.codedWidth || t.displayHeight !== t.codedHeight) {
                    o.display_width = t.displayWidth; o.display_height = t.displayHeight;
                }
                if (t.packetRate != null) o.fps = +t.packetRate.toFixed(3);
                if (t.packetCount != null) o.frame_count = t.packetCount;
                if (t.bitrate != null) o.bitrate_bps = Math.round(t.bitrate);
                if (t.rotation) o.rotation = t.rotation;
                if (t.hdr) o.hdr = true;
                if (t.colorSpace) {
                    const cs = {};
                    if (t.colorSpace.primaries) cs.primaries = t.colorSpace.primaries;
                    if (t.colorSpace.transfer) cs.transfer = t.colorSpace.transfer;
                    if (t.colorSpace.matrix) cs.matrix = t.colorSpace.matrix;
                    if (Object.keys(cs).length) o.color_space = cs;
                }
                return o;
            });
        }
        const at = info.tracks.filter(t => t.type === 'audio');
        if (at.length) {
            obj.audio_tracks = at.map(t => {
                const o = { codec: t.codecString || t.codec, sample_rate: t.sampleRate, channels: t.channels };
                if (t.bitrate != null) o.bitrate_bps = Math.round(t.bitrate);
                return o;
            });
        }
        if (info.tags) obj.tags = info.tags;

        switch (fmt) {
            case 'json': return JSON.stringify(obj, null, 2);
            case 'python':
                return '# Media Info\nmedia_info = ' +
                    JSON.stringify(obj, null, 4).replace(/\bnull\b/g, 'None')
                    .replace(/\btrue\b/g, 'True').replace(/\bfalse\b/g, 'False');
            case 'csv': {
                const v = obj.video_tracks?.[0] || {};
                const a = obj.audio_tracks?.[0] || {};
                const hd = 'filename,format,duration_s,size_bytes,video_codec,width,height,fps,frames,video_bps,audio_codec,sample_rate,channels,audio_bps';
                const rw = [info.filename, info.format, info.duration.toFixed(3), info.fileSize,
                    v.codec||'', v.width||'', v.height||'', v.fps||'', v.frame_count||'', v.bitrate_bps||'',
                    a.codec||'', a.sample_rate||'', a.channels||'', a.bitrate_bps||''].join(',');
                return hd + '\n' + rw;
            }
        }
    }
    </script>
</body>
</html>
